<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
  }
  #score {
    font-size: 24px;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  canvas {
    border: 2px solid #0f3460;
    display: block;
  }
  #hint {
    margin-top: 12px;
    font-size: 14px;
    color: #888;
  }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="hint">Arrow keys to move, Space to start</div>
<script>
(function() {
  // Constants
  const GRID = 20;
  const CELL = 20;
  const SPEED = 150;

  // Canvas setup
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  // Game state
  let state; // 'waiting' | 'playing' | 'gameover'
  let snake;
  let direction;
  let nextDirection;
  let food;
  let score;
  let lastTime;
  let accumulator;

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    scoreEl.textContent = 'Score: 0';
    lastTime = 0;
    accumulator = 0;
    spawnFood();
    state = 'waiting';
  }

  function spawnFood() {
    if (snake.length >= GRID * GRID) {
      state = 'gameover'; // Win condition
      return;
    }
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
    } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
    food = pos;
  }

  // Rendering
  function draw() {
    // Clear canvas with background
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw food
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(food.x * CELL + 1, food.y * CELL + 1, CELL - 2, CELL - 2);

    // Draw snake
    snake.forEach(function(seg, i) {
      ctx.fillStyle = i === 0 ? '#2ecc71' : '#27ae60';
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    });

    // Overlays
    if (state === 'waiting') {
      drawOverlay('\u6309\u7a7a\u683c\u5f00\u59cb');
    } else if (state === 'gameover') {
      drawOverlay('\u6e38\u620f\u7ed3\u675f Score: ' + score + '\n\u6309\u7a7a\u683c\u91cd\u65b0\u5f00\u59cb');
    }
  }

  function drawOverlay(text) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Courier New, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = text.split('\n');
    const lineHeight = 30;
    const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2;
    lines.forEach(function(line, i) {
      ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
    });
  }

  // Input handling
  const DIRECTION_MAP = {
    ArrowUp: 'up',
    ArrowDown: 'down',
    ArrowLeft: 'left',
    ArrowRight: 'right'
  };

  const OPPOSITES = {
    up: 'down',
    down: 'up',
    left: 'right',
    right: 'left'
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === ' ') {
      e.preventDefault();
      if (state === 'waiting') {
        state = 'playing';
        lastTime = 0;
        accumulator = 0;
      } else if (state === 'gameover') {
        init();
        state = 'playing';
        lastTime = 0;
        accumulator = 0;
      }
      return;
    }

    const dir = DIRECTION_MAP[e.key];
    if (dir) {
      e.preventDefault();
      if (state === 'playing' && dir !== OPPOSITES[direction]) {
        nextDirection = dir;
      }
    }
  });

  // Movement deltas
  const DELTAS = {
    up:    { x:  0, y: -1 },
    down:  { x:  0, y:  1 },
    left:  { x: -1, y:  0 },
    right: { x:  1, y:  0 }
  };

  function update() {
    direction = nextDirection;
    const delta = DELTAS[direction];
    const head = snake[0];
    const newHead = { x: head.x + delta.x, y: head.y + delta.y };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
      state = 'gameover';
      return;
    }

    // Self collision
    if (snake.some(function(seg) { return seg.x === newHead.x && seg.y === newHead.y; })) {
      state = 'gameover';
      return;
    }

    snake.unshift(newHead);

    // Food collision
    if (newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      scoreEl.textContent = 'Score: ' + score;
      spawnFood();
    } else {
      snake.pop();
    }
  }

  // Game loop
  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    if (state === 'playing') {
      if (lastTime === 0) {
        lastTime = timestamp;
      }
      accumulator += timestamp - lastTime;
      lastTime = timestamp;

      if (accumulator > SPEED * 3) {
        accumulator = SPEED;
      }

      while (accumulator >= SPEED) {
        accumulator -= SPEED;
        update();
        if (state !== 'playing') break;
      }
    }

    draw();
  }

  // Start
  init();
  requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
