name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest tomli

      - name: Install tmux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          else
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Syntax check
        run: python -m compileall -q lib bin ccb

      - name: Run tests
        run: pytest test/ -v --tb=short
        shell: bash

  macos-install-smoke:
    name: macOS install smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest tomli

      - name: Run install and update focused tests
        run: |
          pytest -q \
            test/test_install_identity_output.py \
            test/test_install_major_upgrade_guard.py \
            test/test_cli_management_update.py

      - name: Smoke macOS installer branches
        shell: bash
        run: |
          set -euo pipefail

          platform="$(bash -lc 'source ./install.sh; detect_platform')"
          test "$platform" = "macos"

          tmux_hint="$(bash -lc 'source ./install.sh; print_tmux_install_hint')"
          printf '%s\n' "$tmux_hint"
          [[ "$tmux_hint" == *"macOS:"* ]]

          install_identity="$(
            CCB_LANG=en \
            CCB_SOURCE_KIND=release \
            CCB_BUILD_CHANNEL=stable \
            CCB_BUILD_VERSION=0.0.0-ci \
            bash -lc 'source ./install.sh; print_install_identity_summary; print_install_identity_notice'
          )"
          printf '%s\n' "$install_identity"
          [[ "$install_identity" == *"install_mode=release"* ]]
          [[ "$install_identity" == *"source_kind=release"* ]]
          [[ "$install_identity" == *"channel=stable"* ]]
          [[ "$install_identity" == *"version=0.0.0-ci"* ]]
          [[ "$install_identity" == *"Official release package install detected"* ]]

  test-wsl:
    name: WSL / Ubuntu 22.04
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup WSL
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04

      - name: Install Python and dependencies in WSL
        shell: wsl-bash {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip tmux
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest tomli

      - name: Syntax check in WSL
        shell: wsl-bash {0}
        run: python3 -m compileall -q lib bin ccb

      - name: Run tests in WSL with tmux
        shell: wsl-bash {0}
        run: |
          export TERM=xterm-256color
          python3 -m pytest test/ -v --tb=short
